<!DOCTYPE html>
<html lang="id">
<head>
  <!-- 
    Nama : Wahyu Bagus Setiawan

  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrasi Praktikan</title>
  
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #f4f7f6; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
      margin: 0;
      padding: 20px;
    }
    
    .form-wrapper {
      background-color: #ffffff;
      max-width: 500px;
      margin: 30px auto;
      padding: 30px 40px;
      border-radius: 8px;
      box-shadow: 0px 8px 16px rgba(0,0,0,0.08);
      border-top: 5px solid #2980b9;
    }
    
    .form-title {
      text-align: center;
      margin-top: 0;
      margin-bottom: 25px;
      font-size: 22px;
      color: #2c3e50;
    }
    
    .input-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }
    
    .input-group label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #555;
    }
    
    .input-group input[type="text"], 
    .input-group input[type="password"], 
    .input-group input[type="email"], 
    .input-group select, 
    .input-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #dcdcdc;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .input-group input:focus, 
    .input-group select:focus, 
    .input-group textarea:focus {
      outline: none;
      border-color: #2980b9;
    }
    
    .radio-checkbox-group {
      display: flex;
      gap: 15px;
      font-size: 14px;
      margin-top: 5px;
    }
    
    .action-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .btn-cancel {
      background-color: #e74c3c;
      color: white;
    }
    
    .btn-cancel:hover {
      background-color: #c0392b;
    }

    .btn-submit {
      background-color: #2980b9;
      color: white;
    }

    .btn-submit:hover {
      background-color: #1a5276;
    }
  </style>
</head>
<body>

  <div class="form-wrapper">
    <h2 class="form-title">Formulir Data Praktikan</h2>
    
    <form action="#" method="POST">
      
      <div class="input-group">
        <label for="nama">Nama Lengkap</label>
        <input type="text" id="nama" name="nama" required>
      </div>

      <div class="input-group">
        <label for="nim">NIM</label>
        <input type="text" id="nim" name="nim" required>
      </div>

      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Masukkan username" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <div class="input-group">
        <label for="email">Alamat Email</label>
        <input type="email" id="email" name="email" placeholder="contoh@email.com" required>
      </div>

      <div class="input-group">
        <label>Jenis Kelamin</label>
        <div class="radio-checkbox-group">
          <label><input type="radio" name="jk" value="Pria" checked> Pria</label>
          <label><input type="radio" name="jk" value="Wanita"> Wanita</label>
        </div>
      </div>

      <div class="input-group">
        <label>Hobi</label>
        <div class="radio-checkbox-group">
          <label><input type="checkbox" name="hobi[]" value="Renang"> Renang</label>
          <label><input type="checkbox" name="hobi[]" value="Bersepeda"> Bersepeda</label>
          <label><input type="checkbox" name="hobi[]" value="Memancing"> Memancing</label>
        </div>
      </div>

      <div class="input-group">
        <label for="pendidikan">Jenjang Pendidikan</label>
        <select id="pendidikan" name="pendidikan">
          <option value="">-- Silakan Pilih --</option>
          <option value="D3">Diploma 3 (D3)</option>
          <option value="S1">Strata 1 (S1)</option>
          <option value="S2">Strata 2 (S2)</option>
          <option value="S3">Strata 3 (S3)</option>
        </select>
      </div>

      <div class="input-group">
        <label for="kritik_saran">Kritik & Saran</label>
        <textarea id="kritik_saran" name="kritik_saran" rows="4" placeholder="Tulis masukan di sini..."></textarea>
      </div>

      <div class="action-buttons">
        <button type="reset" class="btn btn-cancel">Batal</button>
        <button type="submit" class="btn btn-submit">Kirim Data</button>
      </div>

    </form>
  </div>

</body>
</html>
