<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Latihan Layouting</title>
  <style>
    .container-box {
      background-color: #e0e0e0; 
      padding: 15px 10px;
      border-left: 5px solid #ccc; 
    }
    .highlight-text {
      background-color: #ff6347; 
      color: white; 
      font-style: italic;
      font-weight: bold;
      padding: 4px 8px; 
    }
  </style>
</head>
<body>
  <div class="container-box">
    <p>Isi dari bagian <span class="highlight-text">Property</span></p>
  </div>
</body>
</html>
