<!DOCTYPE html>
<html>
<head>
    <title>Contoh Text Align</title>

    <style>
        h1 {
            text-align: center;
        }

        h2 {
            text-align: left;
        }

        h3 {
            text-align: right;
        }
    </style>

</head>
<body>
    <h1>Dita</h1>
    <h2>2311102069</h2>
    <h3>IF 11 04</h3>
    <p>
        Contoh ini menunjukkan penggunaan properti <b>text-align</b> pada CSS untuk mengatur posisi teks.
    </p>
</body>
</html>
