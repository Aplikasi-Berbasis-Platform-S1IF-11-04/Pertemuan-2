<!DOCTYPE html>
<html>
<head>
    <title>List Properties dengan CSS</title>

    <style>
        ul.listsatu {

            background-color: tomato;

            margin: 10px 5px 10px 5px;

            list-style-type: lower-alpha;

            list-style-position: inside;
        }

        ol.listdua {

            background-color: lightblue;

            list-style-type: lower-roman;

            padding: 5px 5px 15px 15px;

            list-style-position: inside;
        }
    </style>

</head>

<body>
    <h3>List of Property Dita with CSS</h3>
    <ol>
        <li>Indoor
            <ul class="listsatu">
                <li>Sofa</li>
            </ul>
        </li>
        <li>Outdoor
            <ol class="listdua">
                <li>Tanaman Hias</li>
            </ol>
        </li>
    </ol>
</body>
</html>
